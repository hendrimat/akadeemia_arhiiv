{%- for _, css_src in css_dependency_srcs.items() -%}
<style>
    {{ css_src | safe }}
</style>
{%- endfor %}
<style>
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: {{page_background_color}};
        font-family: {{title_font_family}};
        color: {{title_font_color}};
    }

    body {
        display: flex;
        flex-direction: column;
    }

    .header-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .nav-links-left a, .header-nav > a {
        color: white;
        text-decoration: none;
        font-family: 'Jost', sans-serif;
    }

    .container {
        flex: 1; /* Grow to fill available space */
        position: relative; /* Needed for child absolute positioning */
        display: flex;
        flex-direction: column;
    }

    #deck-container {
        flex: 1;
        position: relative;
    }

    #deck-container canvas {
        background: {{page_background_color}};
    }

    .content-wrapper {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; /* Pierce through the main wrapper */
    }

    .stack {
        /* Prevent the div from expanding beyond the width/height of its children */
        width: max-content;
        height: max-content;
        pointer-events: auto;
    }

    /* Specifically re-enable interactions ONLY for the actual UI components */
    .content-wrapper .container-box,
    .content-wrapper .mobile-controls,
    .content-wrapper .tab-button {
        pointer-events: auto;
    }

    .deck-tooltip {
        background-color: #ffffff !important;
        color: var(--text-color) !important;
        border: 1px solid var(--text-color) !important;
        padding: var(--spacing) !important;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1) !important;
        font-size: 0.9rem !important;
        z-index: 10000 !important;
    }


</style>

{%- if custom_css %}
<style>
    {{custom_css}}
</style>
{%- endif %}
